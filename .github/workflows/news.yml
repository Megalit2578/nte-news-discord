name: NTE News → Discord

on:
  schedule:
    - cron: "*/30 * * * *"     # every 30 min (UTC). Change freely.
  workflow_dispatch: {}         # lets you run it by hand from the Actions tab

concurrency:
  group: nte-news
  cancel-in-progress: false

permissions:
  contents: write               # to commit the "seen" state back

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Poll feeds and post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python post_feeds.py

      - name: Persist seen-state
        run: |
          if [[ -n "$(git status --porcelain state/seen.json)" ]]; then
            git config user.name  "nte-news-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "state: update seen items [skip ci]"
            git push
          else
            echo "No state change."
          fi
