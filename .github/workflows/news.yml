name: NTE News → Discord

on:
  schedule:
    - cron: "*/30 * * * *"     # poll feeds every 30 min (UTC)
    - cron: "0 13 * * *"       # daily digest at 20:00 Vietnam time (13:00 UTC)
  workflow_dispatch:            # lets you run it by hand from the Actions tab
    inputs:
      dry_run:
        description: "Dry run — parse feeds and print, post NOTHING"
        type: boolean
        default: false
      seed_post:
        description: "Post the N latest per NEW source (demo/test). 0 = normal"
        type: string
        default: "0"
      digest:
        description: "Post the daily digest now (summary of today's news)"
        type: boolean
        default: false
      test_url:
        description: "Live test: post ONE article from this URL (bypasses dedup)"
        type: string
        default: ""

concurrency:
  group: nte-news
  cancel-in-progress: false

permissions:
  contents: write               # to commit the "seen" state back

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Poll feeds and post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # Optional: set repo variable PING_ROLE_ID to @-ping a role on
          # important news (new codes / maintenance / banners). Empty = no ping.
          PING_ROLE_ID: ${{ vars.PING_ROLE_ID }}
          # Optional: Reddit app creds → reliable Reddit/leaks (no 429). Without
          # them the bot falls back to anonymous RSS (often throttled on cloud).
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          # Manual-run knobs (default to a normal run when scheduled).
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
          SEED_POST: ${{ inputs.seed_post || '0' }}
          # Daily-digest mode: on the 13:00-UTC cron, or when run by hand with digest=true.
          DIGEST: ${{ (github.event.schedule == '0 13 * * *' || inputs.digest) && '1' || '' }}
          TEST_URL: ${{ inputs.test_url }}
        run: python post_feeds.py

      - name: Persist seen-state
        run: |
          if [[ -z "$(git status --porcelain state/seen.json)" ]]; then
            echo "No state change."; exit 0
          fi
          git config user.name  "nte-news-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BR="${GITHUB_REF_NAME:-main}"
          # The branch can move under us (a merge, a manual run). Union-merge the
          # remote's seen.json into ours, then lay ONLY that file on top of the
          # fresh remote tip and push — retrying so a moving branch never fails
          # the run or drops state (which would re-post items). We hard-reset to
          # the remote tip (to pick up any code it gained) and re-apply just the
          # merged seen.json, so no other file is ever reverted.
          for i in 1 2 3 4 5; do
            git fetch --quiet origin "$BR"
            git show "origin/$BR:state/seen.json" > /tmp/remote_seen.json 2>/dev/null || echo '{}' > /tmp/remote_seen.json
            python .github/merge_seen.py state/seen.json /tmp/remote_seen.json
            cp state/seen.json /tmp/merged_seen.json
            git reset --hard "origin/$BR"
            cp /tmp/merged_seen.json state/seen.json
            git add state/seen.json
            if git diff --cached --quiet; then echo "State already up to date."; exit 0; fi
            git commit -m "state: update seen items [skip ci]"
            if git push origin "HEAD:$BR"; then echo "State pushed."; exit 0; fi
            echo "Push rejected (branch moved) — retry $i"; sleep 3
          done
          echo "Could not persist state after retries"; exit 1
