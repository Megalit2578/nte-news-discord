# ─────────────────────────────────────────────────────────────────────────────
# NTE news sources → Discord.  Add/remove as many as you want — NO limit.
#
#   type: rss           → any RSS/Atom feed URL
#   type: pw_scrape     → the official Perfect World news index (HTML, no RSS)
#   type: steam_news    → official Steam announcements (needs `appid:`)
#   type: codes_tracker → scrape active codes → one self-updating pinned message
#   color:              → embed side-color (hex)
#   enabled: false      → keep it in the file but skip it
#   optional: true      → a fetch failure is ignored quietly (no noise)
#   include:            → title MUST match this regex (stay on-topic)
#   exclude:            → drop titles matching this regex (noise)
#   keep:               → whitelist regex that OVERRIDES exclude (news beats guides)
#   ping: false         → never @-ping for this source (see PING_ROLE_ID)
#
# The bot de-duplicates ACROSS sources by story (url + normalized title), so the
# same news picked up by several feeds is posted only once — by whichever source
# appears FIRST below. Keep the most authoritative sources near the top.
# ─────────────────────────────────────────────────────────────────────────────

- name: "YouTube — NTE Global"
  type: rss
  url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCIc-uir_VVR8D2RlUyP29Aw"
  color: 0xFF0000
  emoji: "🎬"
  video: true        # post as a link → Discord shows a PLAYABLE inline player

- name: "Official — Perfect World"
  type: pw_scrape
  url: "https://nte.perfectworld.com/en/article/news/index.html"
  color: 0x00C2FF
  emoji: "🌐"
  icon: "https://nte.perfectworld.com/public/images/icon.png"

# Official Steam "Community Announcements" (patch notes, events, maintenance).
# Uses the ISteamNews API because the store RSS 404s until launch (8 Jul 2026).
- name: "Steam — NTE"
  type: steam_news
  appid: 4508340
  color: 0x1B2838
  emoji: "🎮"
  icon: "https://store.steampowered.com/favicon.ico"

- name: "Reddit — r/NevernessToEverness"
  type: rss
  url: "https://www.reddit.com/r/NevernessToEverness/.rss"
  color: 0xFF4500
  emoji: "👽"
  icon: "https://www.redditstatic.com/desktop2x/img/favicon/android-icon-192x192.png"
  optional: true   # reddit sometimes rate-limits cloud IPs
  # r/ is mostly memes/chit-chat — keep only genuine news (leaks, codes,
  # patch notes, official announcements). Version numbers alone aren't enough
  # (memes mention "1.2"), so those terms are intentionally excluded.
  include: '(?i)\b(code|redeem|patch ?notes?|maintenance|hotfix|official|datamine|leak(ed|s)?|announce(d|ment)?|drop ?rate|tier ?list|new banner|new character|nerf|buff)\b'
  exclude: '(?i)megathread|daily thread|weekly question|free ?talk|rate my|cosplay'

# Dedicated NTE leaks subreddit (beta/datamine/upcoming banners & characters).
# Optional because Reddit sometimes rate-limits cloud IPs; light filter keeps it
# to actual leaks, not mod posts / memes / general discussion.
- name: "Leaks — r/NTELeaks"
  type: rss
  url: "https://www.reddit.com/r/NTELeaks/.rss"
  color: 0x9146FF
  emoji: "🔓"
  optional: true
  include: '(?i)\b(leak(ed|s)?|beta|datamine[d]?|drip ?marketing|prefarm|upcoming|new (character|unit|banner|arc|weapon)|banner|version|v?\d+\.\d+|kit|skill|roadmap|schedule|silhouette|teaser)\b'
  exclude: '(?i)megathread|daily|weekly|moderator|announcement|rule|meme|fan ?art|cosplay|discussion thread|question'

- name: "Community — neverness.gg"
  type: rss
  url: "https://neverness.gg/feed/"
  color: 0xC9F500
  emoji: "📘"
  icon: "https://neverness.gg/wp-content/uploads/sites/88/2025/12/Neverness-to-Everness-Icon-300x300.jpg"
  og_image: true   # use the wide banner image → embed renders full-width

# Google News — aggregates pro coverage (IGN, PC Gamer, AUTOMATON, Mobalytics…).
# Strong signal for a NEWS channel. Links redirect to the real articles.
- name: "Google News — NTE"
  type: rss
  url: "https://news.google.com/rss/search?q=%22Neverness%20to%20Everness%22%20when%3A30d&hl=en-US&gl=US&ceid=US:en"
  color: 0x4285F4
  emoji: "🗞️"
  include: '(?i)neverness|\bNTE\b'   # stay on-topic (drop passing mentions)
  # Real news ALWAYS passes (beats the exclude below)…
  keep:    '(?i)\b(code|redeem|maintenance|hotfix|patch|update|version|banner|event|launch|release|leak|nerf|buff|compensat|announce|anniversary|collab|revenue|delay|server|down)\b'
  # …but strip the evergreen guide/tier-list/reroll SEO spam that isn't news.
  exclude: '(?i)(tier ?list|reroll|best (build|team)|beginner|how to get|team comp|walkthrough|\bfarm(ing)?\b|\btips\b|wiki|voice actor|fishing|dailies|city tycoon|\bcafe\b|materials|ascension|\bfons\b|reset time|worth (pulling|it)|should you|guide)'

# Live "Active codes" card: the bot scrapes the current working codes and keeps
# ONE message updated in place (edits it when codes change; pings on brand-new
# codes). Pin the message it creates. Not a normal feed item.
- name: "Codes tracker"
  type: codes_tracker
  url: "https://neverness.gg/codes/"
  color: 0xFFD700

# X/Twitter no longer offers free native RSS. Public RSSHub for twitter is
# unreliable (needs auth). Left here disabled — to turn it on, point `url` at a
# working RSSHub or Nitter instance you trust, then set `enabled: true`.
- name: "X — @NTE_GL"
  type: rss
  url: "https://rsshub.app/twitter/user/NTE_GL"
  color: 0x1DA1F2
  enabled: false
  optional: true
